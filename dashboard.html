<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asset Predictor PRO | AI Trading Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #05070a;
    --card-bg: rgba(17, 24, 39, 0.7);
    --border: rgba(255, 255, 255, 0.08);
    --accent: #3b82f6;
    --text: #f8fafc;
    --text-dim: #94a3b8;
    --buy: #10b981;
    --sell: #ef4444;
    --flat: #f59e0b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    background-image: 
      radial-gradient(circle at 0% 0%, rgba(59, 130, 246, 0.05) 0%, transparent 50%),
      radial-gradient(circle at 100% 100%, rgba(16, 185, 129, 0.05) 0%, transparent 50%);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
    line-height: 1.5;
  }

  /* Glassmorphism Card */
  .glass {
    background: var(--card-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 16px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }
  
  .logo-group { display: flex; align-items: center; gap: 12px; }
  .logo-group h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  
  .status-pill {
    background: rgba(34, 197, 94, 0.1);
    color: #4ade80;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid rgba(34, 197, 94, 0.2);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .dot { width: 6px; height: 6px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 10px #22c55e; animation: pulse 2s infinite; }

  /* Main Layout */
  .main-grid {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 20px;
  }

  /* Left Column: Signal & Info */
  .side-panel { display: flex; flex-direction: column; gap: 20px; }

  .signal-box {
    padding: 32px;
    text-align: center;
  }
  .signal-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
  .signal-value { font-size: 56px; font-weight: 800; letter-spacing: -2px; line-height: 1; margin-bottom: 24px; }
  .signal-value.BUY  { color: var(--buy); text-shadow: 0 0 30px rgba(16, 185, 129, 0.3); }
  .signal-value.SELL { color: var(--sell); text-shadow: 0 0 30px rgba(239, 68, 68, 0.3); }
  .signal-value.FLAT { color: var(--flat); text-shadow: 0 0 30px rgba(245, 158, 11, 0.3); }
  .signal-value.UNKNOWN { color: var(--text-dim); }

  .confidence-gauge {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.05);
    border-radius: 3px;
    overflow: hidden;
    margin: 12px 0;
  }
  .conf-fill { height: 100%; background: var(--accent); transition: width 1s ease-out; }

  /* Right Column: Chart & Metrics */
  .content-panel { display: flex; flex-direction: column; gap: 20px; }

  .chart-container {
    height: 600px;
    overflow: hidden;
  }

  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
  }
  .metric-card { padding: 20px; }
  .m-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
  .m-value { font-size: 20px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }

  /* Controls */
  .control-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 10px 24px;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-train {
    background: rgba(245, 158, 11, 0.15);
    color: var(--flat);
    border: 1px solid rgba(245,158,11,0.3);
    padding: 10px 20px;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 13px;
  }
  .btn-train:hover { background: rgba(245,158,11,0.25); }
  .btn-train:disabled { opacity: 0.5; cursor: not-allowed; }
  .no-model-badge {
    background: rgba(239,68,68,0.1);
    color: var(--sell);
    border: 1px solid rgba(239,68,68,0.3);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 600;
    display: none;
  }

  select {
    background: var(--card-bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 14px;
    outline: none;
  }

  #train-log {
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim);
    max-height: 120px;
    overflow-y: auto;
    margin-bottom: 16px;
    display: none;
    white-space: pre-wrap;
  }

  /* History List */
  .history-list { list-style: none; margin-top: 10px; }
  .history-item {
    display: flex;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .h-time { color: var(--text-dim); font-size: 12px; }
  .h-sig { font-weight: 700; }
  .h-sig.BUY { color: var(--buy); }
  .h-sig.SELL { color: var(--sell); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  #error-box {
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid var(--sell);
    color: var(--sell);
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 16px;
    display: none;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    white-space: pre-wrap;
    max-height: 200px;
    overflow-y: auto;
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo-group">
    <h1>ASSET PREDICTOR <span style="font-weight:300; opacity:0.5">PRO</span></h1>
    <div class="status-pill"><div class="dot"></div> LIVE AI AGENT</div>
  </div>
  <div class="pair-badge" id="pair-display" style="font-family:'JetBrains Mono'; color:var(--text-dim)">LOADING MARKET</div>
</div>

<div id="error-box"></div>

<div class="control-bar">
  <select id="pair-select" onchange="onPairChange()" style="font-family:'JetBrains Mono'; font-weight:600;">
    <option value="EURUSD=X">EUR/USD</option>
    <option value="GBPUSD=X">GBP/USD</option>
    <option value="USDJPY=X">USD/JPY</option>
    <option value="USDCHF=X">USD/CHF</option>
    <option value="AUDUSD=X">AUD/USD</option>
    <option value="USDCAD=X">USD/CAD</option>
    <option value="NZDUSD=X">NZD/USD</option>
    <option value="EURGBP=X">EUR/GBP</option>
    <option value="EURJPY=X">EUR/JPY</option>
    <option value="GBPJPY=X">GBP/JPY</option>
    <option value="INRUSD=X">INR/USD</option>
    <option value="USDINR=X">USD/INR</option>
    <option value="BTC-USD">BTC/USD (Crypto)</option>
    <option value="ETH-USD">ETH/USD (Crypto)</option>
    <option value="SOL-USD">SOL/USD (Crypto)</option>
  </select>
  <button class="btn-primary" id="refresh-btn" onclick="fetchSignal()">RUN PREDICTION</button>
  <button class="btn-train" id="train-btn" onclick="trainModel()">⚡ TRAIN MODEL</button>
  <span class="no-model-badge" id="no-model-badge">⚠ No model for this pair</span>
  <select id="auto-select" onchange="setAutoRefresh()">
    <option value="0">Auto-Refresh: Off</option>
    <option value="300">Every 5 Min</option>
    <option value="3600" selected>Every Hour</option>
  </select>
  <span id="countdown" style="font-size:12px; color:var(--text-dim); font-family:'JetBrains Mono'"></span>
</div>
<div id="train-log"></div>

<div class="main-grid">
  <!-- Left Side -->
  <div class="side-panel">
    <div class="glass signal-box">
      <div class="signal-label">Current Analysis</div>
      <div class="signal-label" id="model-market-label" style="font-size:10px; margin-bottom:18px">MODEL MARKET</div>
      <div class="signal-value UNKNOWN" id="signal-val">—</div>
      
      <div style="display:flex; justify-content:space-between; font-size:11px; color:var(--text-dim)">
        <span>CONFIDENCE</span>
        <span id="conf-pct">0%</span>
      </div>
      <div class="confidence-gauge">
        <div class="conf-fill" id="conf-fill" style="width: 0%"></div>
      </div>
      
      <div style="margin-top:24px; padding-top:24px; border-top:1px solid var(--border)">
        <div class="signal-label" style="font-size:10px">Market Price</div>
        <div class="m-value" id="close-val" style="font-size:28px">0.00000</div>
      </div>
    </div>

    <div class="glass" style="padding:20px">
      <div class="m-label">Risk Protocol</div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px">
        <div>
          <div class="signal-label" style="font-size:9px">Stop Loss</div>
          <div class="m-value" id="sl-val" style="font-size:15px; color:var(--sell)">—</div>
        </div>
        <div>
          <div class="signal-label" style="font-size:9px">Take Profit</div>
          <div class="m-value" id="tp-val" style="font-size:15px; color:var(--buy)">—</div>
        </div>
      </div>
    </div>

    <div class="glass" style="padding:20px; flex:1; overflow-y:auto">
      <div class="m-label">Signal History</div>
      <div class="history-list" id="history-list">
        <div style="color:var(--text-dim); font-size:12px; text-align:center; margin-top:20px">Waiting for first signal...</div>
      </div>
    </div>
  </div>

  <!-- Right Side -->
  <div class="content-panel">
    <div class="glass chart-container">
      <!-- TradingView Chart via iframe (avoids re-init popup bug) -->
      <iframe id="tv-chart"
        src="https://www.tradingview.com/widgetembed/?symbol=FX%3AEURUSD&interval=60&theme=dark&style=1&locale=en&hide_side_toolbar=0&allow_symbol_change=1&save_image=0&frameElementId=tv-chart"
        style="width:100%;height:100%;border:none;"
        allowtransparency="true"
        scrolling="no">
      </iframe>
    </div>

    <div class="metrics-grid">
      <div class="glass metric-card">
        <div class="m-label">Bullish Probability</div>
        <div class="m-value" id="prob-up" style="color:var(--buy)">0.0%</div>
      </div>
      <div class="glass metric-card">
        <div class="m-label">Bearish Probability</div>
        <div class="m-value" id="prob-down" style="color:var(--sell)">0.0%</div>
      </div>
      <div class="glass metric-card">
        <div class="m-label">Analysis Time</div>
        <div class="m-value" id="time-val" style="font-size:14px">—</div>
      </div>
    </div>
  </div>
</div>

<script>
let history = [];
let autoTimer = null;
let trainPollTimer = null;

function loadChart(symbol = "FX:EURUSD", interval = "60") {
  const encoded = encodeURIComponent(symbol);
  document.getElementById('tv-chart').src =
    `https://www.tradingview.com/widgetembed/?symbol=${encoded}&interval=${interval}&theme=dark&style=1&locale=en&hide_side_toolbar=0&allow_symbol_change=1&save_image=0`;
}

async function loadAppConfig() {
  try {
    const res = await fetch('/api/config');
    const cfg = await res.json();
    document.getElementById('pair-display').textContent =
      `AI MODEL: ${cfg.pair_code} - ${cfg.timeframe.toUpperCase()} DATA - ${cfg.forecast_horizon}H HORIZON`;
    document.getElementById('model-market-label').textContent = `${cfg.pair_code} AI MODEL`;
    loadChart(cfg.tradingview_symbol, cfg.tradingview_interval);

    // Sync pair selector
    const sel = document.getElementById('pair-select');
    if (sel) sel.value = cfg.pair;

    // Show/hide no-model badge
    const badge = document.getElementById('no-model-badge');
    badge.style.display = cfg.model_exists ? 'none' : 'inline-block';

    return cfg;
  } catch(e) {
    document.getElementById('pair-display').textContent = 'CONFIG UNAVAILABLE';
    loadChart();
  }
}

async function onPairChange() {
  const pair = document.getElementById('pair-select').value;
  const err  = document.getElementById('error-box');
  err.style.display = 'none';

  try {
    await fetch('/api/set_pair', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({pair})
    });
    const cfg = await loadAppConfig();
    const refreshBtn = document.getElementById('refresh-btn');
    if (cfg && cfg.model_exists) {
      refreshBtn.disabled = false;
      fetchSignal();
    } else {
      // No model — disable predict button and reset signal display
      refreshBtn.disabled = true;
      const val = document.getElementById('signal-val');
      val.textContent = '—';
      val.className = 'signal-value UNKNOWN';
      document.getElementById('conf-pct').textContent = '0%';
      document.getElementById('conf-fill').style.width = '0%';
      document.getElementById('close-val').textContent = '0.00000';
      document.getElementById('sl-val').textContent = '—';
      document.getElementById('tp-val').textContent = '—';
      document.getElementById('prob-up').textContent = '0.0%';
      document.getElementById('prob-down').textContent = '0.0%';
      document.getElementById('time-val').textContent = '—';
    }
  } catch(e) {
    err.style.display = 'block';
    err.textContent = 'Failed to switch pair.';
  }
}

async function trainModel() {
  const btn = document.getElementById('train-btn');
  const err = document.getElementById('error-box');
  btn.disabled = true;
  btn.textContent = '⏳ TRAINING...';
  err.style.display = 'none';

  try {
    const res = await fetch('/api/train', {method:'POST'});
    const d = await res.json();
    if (d.error) {
      err.style.display = 'block';
      err.textContent = 'Training error: ' + d.error;
      btn.disabled = false;
      btn.textContent = '⚡ TRAIN MODEL';
      return;
    }
    pollTrainStatus();
  } catch(e) {
    err.style.display = 'block';
    err.textContent = 'Failed to start training. Is app.py running?';
    btn.disabled = false;
    btn.textContent = '⚡ TRAIN MODEL';
  }
}

function pollTrainStatus() {
  clearInterval(trainPollTimer);
  trainPollTimer = setInterval(async () => {
    try {
      const res  = await fetch('/api/train_status');
      const data = await res.json();
      const btn  = document.getElementById('train-btn');
      const err  = document.getElementById('error-box');

      if (!data.running) {
        clearInterval(trainPollTimer);
        btn.disabled = false;
        btn.textContent = '⚡ TRAIN MODEL';
        if (data.success) {
          await loadAppConfig();
          document.getElementById('refresh-btn').disabled = false;
          fetchSignal();
        } else {
          err.style.display = 'block';
          err.textContent = '❌ Training failed. Check the terminal for details.';
        }
      }
    } catch(e) {}
  }, 2000);
}

async function fetchSignal() {
  const btn = document.getElementById('refresh-btn');
  const err = document.getElementById('error-box');
  // Guard: check model exists before running prediction
  try {
    const cfg = await (await fetch('/api/config')).json();
    if (!cfg.model_exists) {
      err.style.display = 'block';
      err.textContent = `No trained model for ${cfg.pair_code}. Click ⚡ TRAIN MODEL first.`;
      return;
    }
  } catch(e) {}
  btn.disabled = true;
  btn.textContent = "ANALYZING...";
  err.style.display = 'none';

  try {
    const res = await fetch('/api/predict');
    const data = await res.json();

    if (data.error) {
      err.style.display = 'block';
      err.textContent = "ENGINE ERROR:\n" + data.raw;
      return;
    }

    updateUI(data);
    addToHistory(data);
  } catch(e) {
    err.style.display = 'block';
    err.textContent = "CONNECTION LOST: Ensure app.py is running.";
  } finally {
    btn.disabled = false;
    btn.textContent = "RUN PREDICTION";
  }
}

function updateUI(d) {
  const val = document.getElementById('signal-val');
  val.textContent = d.signal;
  val.className = 'signal-value ' + d.signal;

  document.getElementById('conf-pct').textContent = d.confidence.toFixed(1) + '%';
  document.getElementById('conf-fill').style.width = d.confidence + '%';
  document.getElementById('close-val').textContent = d.close.toFixed(5);
  document.getElementById('sl-val').textContent = d.stop_loss ? d.stop_loss.toFixed(5) : '—';
  document.getElementById('tp-val').textContent = d.take_profit ? d.take_profit.toFixed(5) : '—';
  document.getElementById('prob-up').textContent = d.prob_up.toFixed(1) + '%';
  document.getElementById('prob-down').textContent = d.prob_down.toFixed(1) + '%';
  document.getElementById('time-val').textContent = d.timestamp.slice(0,16);
}

function addToHistory(d) {
  history.unshift(d);
  if (history.length > 10) history.pop();
  const list = document.getElementById('history-list');
  list.innerHTML = history.map(h => `
    <div class="history-item">
      <div>
        <div class="h-sig ${h.signal}">${h.signal}</div>
        <div class="h-time">${h.timestamp.slice(11,16)}</div>
      </div>
      <div style="text-align:right">
        <div style="font-weight:600">${h.close.toFixed(5)}</div>
        <div style="font-size:10px; color:var(--text-dim)">${h.confidence.toFixed(1)}%</div>
      </div>
    </div>
  `).join('');
}

function setAutoRefresh() {
  clearInterval(autoTimer);
  const secs = parseInt(document.getElementById('auto-select').value);
  if (!secs) return;
  autoTimer = setInterval(fetchSignal, secs * 1000);
}

loadAppConfig().then(cfg => {
  setAutoRefresh();
  // Only predict on load if a model exists for the current pair
  if (cfg && cfg.model_exists) fetchSignal();
});
</script>

</body>
</html>
